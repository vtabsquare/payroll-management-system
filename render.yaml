services:
  # Backend Node.js Service
  - type: web
    name: payroll-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: "https://payroll-frontend.onrender.com" # Update this to your frontend's final URL if different
      # The following secrets must be provided in the Render Dashboard
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend Vite Static Site
  - type: web
    name: payroll-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Update this to the actual backend URL generated by Render
      - key: VITE_API_BASE_URL
        value: "https://payroll-backend.onrender.com/api" 
